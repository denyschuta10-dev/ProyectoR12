<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Producto | R12 Sports</title>

    <link rel="stylesheet" href="styletienda.css">

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar-tienda">

        <div class="logo-container">

            <img
                src="/Imagenes/LogoT.jpg"
                class="main-logo"
            >

            <span class="brand-name">
                R12 SPORTS
            </span>

        </div>

    </nav>





    <!-- PRODUCTO -->

    <section class="producto-page">

        <div class="producto-container">

            <!-- IMAGEN -->

            <div class="producto-imagen">

                <img
                    id="producto-img"
                    src=""
                    alt="Producto"
                    onclick="abrirZoom()"
                >

            </div>





            <!-- INFO -->

            <div class="producto-info">

                <h1 id="producto-nombre"></h1>

                <p
                    class="producto-precio"
                    id="producto-precio"
                ></p>

                <p
                    class="producto-descripcion"
                    id="producto-descripcion"
                ></p>

                <p
                    class="producto-stock"
                    id="producto-stock"
                ></p>





                <button
                    class="btn-apple"
                    onclick="agregarProducto()"
                >

                    Agregar al carrito

                </button>





                <button
                    class="btn-whatsapp-buy"
                    onclick="comprarWhatsApp()"
                >

                    Comprar por WhatsApp

                </button>

            </div>

        </div>

    </section>





    <!-- MODAL ZOOM -->

    <div
        class="zoom-modal"
        id="zoomModal"
    >

        <span
            class="cerrar-zoom"
            onclick="cerrarZoom()"
        >

            &times;

        </span>

        <img
            id="zoomImg"
            src=""
        >

    </div>


<div id="customAlert" class="custom-alert">

    <div class="custom-alert-box">

        <h3 id="alertTitle">R12 Sports</h3>

        <p id="alertMessage">
            Mensaje aquí
        </p>

        <button onclick="cerrarAlerta()">
            Entendido
        </button>

    </div>

</div>

<script src="../TiendaR12/script.js"></script>
<script>

let productoActual = null;

const params = new URLSearchParams(window.location.search);

const id = params.get("id");

fetch(window.location.origin + '/productos')

.then(res => res.json())

.then(productos => {

    productoActual = productos.find(p => p.id == id);

    if (!productoActual) {

        document.body.innerHTML =
        "<h1 style='text-align:center;margin-top:100px;'>Producto no encontrado</h1>";

        return;
    }

    document.getElementById("producto-img").src =
    productoActual.imagen_url;

    document.getElementById("producto-nombre").innerText =
    productoActual.nombre;

    document.getElementById("producto-precio").innerText =
    "Q " + parseFloat(productoActual.precio).toFixed(2);

    document.getElementById("producto-descripcion").innerText =
    productoActual.descripcion;

    document.getElementById("producto-stock").innerText =
    "Disponibles: " + productoActual.cantidad;

});

// AGREGAR AL CARRITO
function agregarProducto() {

    if (!productoActual) return;

    let carrito =
    JSON.parse(localStorage.getItem("carrito")) || [];

    const existe =
    carrito.find(p => p.id === productoActual.id);

    if (existe) {

        if (existe.cantidadEnCarrito < productoActual.cantidad) {

            existe.cantidadEnCarrito++;

        } else {

            mostrarAlerta("No hay más stock disponible");

            return;
        }

    } else {

        carrito.push({

            id: productoActual.id,
            nombre: productoActual.nombre,
            precio: parseFloat(productoActual.precio),
            img: productoActual.imagen_url,
            cantidadEnCarrito: 1,
            stockMax: productoActual.cantidad

        });
    }

    localStorage.setItem(
        "carrito",
        JSON.stringify(carrito)
    );

    mostrarAlerta("Producto agregado al carrito");
}

// WHATSAPP
function comprarWhatsApp() {

    if (!productoActual) return;

    const mensaje =
`Hola R12 Sports 🦁

Quiero comprar:

📦 ${productoActual.nombre}
💰 Q ${parseFloat(productoActual.precio).toFixed(2)}`;

    window.open(
        `https://wa.me/50233816134?text=${encodeURIComponent(mensaje)}`,
        '_blank'
    );
}

// ALERTA
function mostrarAlerta(msg) {

    document.getElementById("alertMessage").innerText = msg;

    document.getElementById("customAlert").style.display = "flex";

    document.body.style.overflow = "hidden";
}

function cerrarAlerta() {

    document.getElementById("customAlert").style.display = "none";

    document.body.style.overflow = "auto";
}

// ZOOM
function abrirZoom() {

    const modal =
    document.getElementById("zoomModal");

    const zoomImg =
    document.getElementById("zoomImg");

    zoomImg.src =
    document.getElementById("producto-img").src;

    modal.style.display = "flex";

    document.body.style.overflow = "hidden";
}

function cerrarZoom() {

    document.getElementById("zoomModal").style.display = "none";

    document.body.style.overflow = "auto";
}

window.addEventListener("click", function(e) {

    const modal =
    document.getElementById("zoomModal");

    if (e.target === modal) {

        cerrarZoom();
    }
});

document.addEventListener("keydown", function(e) {

    if (e.key === "Escape") {

        cerrarZoom();
    }
});

</script>
</body>

</html>
