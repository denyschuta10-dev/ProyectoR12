<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Producto | R12 Sports</title>

    <link rel="stylesheet" href="styletienda.css">

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar-tienda">

        <div class="logo-container">

            <img
                src="/Imagenes/LogoT.jpg"
                class="main-logo"
            >

            <span class="brand-name">
                R12 SPORTS
            </span>

        </div>

    </nav>





    <!-- PRODUCTO -->

    <section class="producto-page">

        <div class="producto-container">

            <!-- IMAGEN -->

            <div class="producto-imagen">

                <img
                    id="producto-img"
                    src=""
                    alt="Producto"
                    onclick="abrirZoom()"
                >

            </div>





            <!-- INFO -->

            <div class="producto-info">

                <h1 id="producto-nombre"></h1>

                <p
                    class="producto-precio"
                    id="producto-precio"
                ></p>

                <p
                    class="producto-descripcion"
                    id="producto-descripcion"
                ></p>

                <p
                    class="producto-stock"
                    id="producto-stock"
                ></p>





                <button
                    class="btn-apple"
                    onclick="agregarProducto()"
                >

                    Agregar al carrito

                </button>





                <button
                    class="btn-whatsapp-buy"
                    onclick="comprarWhatsApp()"
                >

                    Comprar por WhatsApp

                </button>

            </div>

        </div>

    </section>





    <!-- MODAL ZOOM -->

    <div
        class="zoom-modal"
        id="zoomModal"
    >

        <span
            class="cerrar-zoom"
            onclick="cerrarZoom()"
        >

            &times;

        </span>

        <img
            id="zoomImg"
            src=""
        >

    </div>


<div id="customAlert" class="custom-alert">

    <div class="custom-alert-box">

        <h3 id="alertTitle">R12 Sports</h3>

        <p id="alertMessage">
            Mensaje aquí
        </p>

        <button onclick="cerrarAlerta()">
            Entendido
        </button>

    </div>

</div>

<script src="script.js"></script>

<script>

// ZOOM
function abrirZoom() {

    const modal =
    document.getElementById("zoomModal");

    const zoomImg =
    document.getElementById("zoomImg");

    zoomImg.src =
    document.getElementById("producto-img").src;

    modal.style.display = "flex";

    document.body.style.overflow = "hidden";
}

function cerrarZoom() {

    document.getElementById("zoomModal").style.display = "none";

    document.body.style.overflow = "auto";
}

window.addEventListener("click", function(e) {

    const modal =
    document.getElementById("zoomModal");

    if (e.target === modal) {

        cerrarZoom();
    }
});

document.addEventListener("keydown", function(e) {

    if (e.key === "Escape") {

        cerrarZoom();
    }
});

</script>
</body>

</html>
